spring:
  application:
    name: ai-page-gen-backend
  # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_page_gen
    username: root
    password: 123456
server:
  port: 8123
  servlet:
    context-path: /api
# springdoc-openapi 文档：http://localhost:8123/api/doc.html
springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: "/**"
      packages-to-scan: com.miu.codemain.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
